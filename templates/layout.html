{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Aditya Singh | Full-Stack & AI Engineer{% endblock %}</title>
  <meta name="description" content="Aditya Singh builds fast, reliable and conversion-focused web products with Django, React and AI systems.">
  <meta name="keywords" content="Aditya Singh, full stack developer, Django developer, AI engineer, portfolio">
  <meta name="author" content="Aditya Singh">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="Aditya Singh | Full-Stack & AI Engineer">
  <meta property="og:description" content="Production-grade portfolio featuring shipped products, measurable impact, and engineering depth.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="{% static 'images/Profile.png' %}">
  <meta property="og:url" content="/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="theme-color" content="#090b14">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWix+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8D0Z8fQd44uQ3qY6F8W8f8R4R8U1fQw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>

  <div id="page-loader" aria-hidden="true">
    <div class="loader-orb"></div>
    <p>Loading experience…</p>
  </div>

  <header class="site-header" id="site-header">
    <nav class="nav shell" aria-label="Primary">
      <a href="#hero" class="brand" aria-label="Go to homepage">Aditya<span>.dev</span></a>
      <button class="menu-toggle" id="menu-toggle" aria-expanded="false" aria-controls="nav-links" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links" id="nav-links">
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#proof">Proof</a>
        <a href="#timeline">Experience</a>
        <a href="#contact">Contact</a>
      </div>
      <div class="nav-actions">
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle dark and light theme"><i class="fa-solid fa-moon"></i></button>
        <button class="icon-btn" id="command-open" aria-label="Open command palette (Control K)"><i class="fa-solid fa-terminal"></i></button>
      </div>
    </nav>
  </header>

  <main id="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="shell footer">
    <p>© {% now "Y" %} Aditya Singh. Built for high-impact teams.</p>
    <div class="footer-links">
      <a href="https://www.linkedin.com/in/aditya-singh-84b82a324/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
      <a href="https://github.com/Student-aditya123" target="_blank" rel="noopener noreferrer" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
      <a href="https://www.instagram.com/aditya4407singh/" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
    </div>
  </footer>

  <div class="command-palette" id="command-palette" role="dialog" aria-modal="true" aria-labelledby="command-title" hidden>
    <div class="command-card">
      <h2 id="command-title">Quick actions</h2>
      <input id="command-input" type="text" placeholder="Type to filter actions..." aria-label="Filter commands">
      <div class="command-list">
        <button data-target="#projects">Go to Projects</button>
        <button data-target="#contact">Go to Contact</button>
        <button data-target="{% static 'resume/aditya_cv.pdf' %}" data-external="true">Open Resume</button>
        <button data-target="https://github.com/Student-aditya123" data-external="true">Open GitHub</button>
      </div>
    </div>
  </div>

  <script>
    const html = document.documentElement;
    const header = document.getElementById('site-header');
    const loader = document.getElementById('page-loader');
    const menuToggle = document.getElementById('menu-toggle');
    const navLinks = document.getElementById('nav-links');
    const palette = document.getElementById('command-palette');
    const paletteOpen = document.getElementById('command-open');
    const paletteInput = document.getElementById('command-input');

    window.addEventListener('load', () => {
      setTimeout(() => loader.classList.add('hidden'), 550);
    });

    window.addEventListener('scroll', () => {
      header.classList.toggle('scrolled', window.scrollY > 20);
    });

    menuToggle?.addEventListener('click', () => {
      const expanded = menuToggle.getAttribute('aria-expanded') === 'true';
      menuToggle.setAttribute('aria-expanded', String(!expanded));
      navLinks.classList.toggle('open');
    });

    document.querySelectorAll('.nav-links a').forEach((link) => {
      link.addEventListener('click', () => {
        menuToggle?.setAttribute('aria-expanded', 'false');
        navLinks.classList.remove('open');
      });
    });

    const toggleTheme = document.getElementById('theme-toggle');
    const savedTheme = localStorage.getItem('theme-preference');
    if (savedTheme) html.dataset.theme = savedTheme;
    toggleTheme?.addEventListener('click', () => {
      html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme-preference', html.dataset.theme);
    });

    const openPalette = () => {
      palette.hidden = false;
      paletteInput.focus();
    };
    const closePalette = () => {
      palette.hidden = true;
      paletteInput.value = '';
      document.querySelectorAll('.command-list button').forEach((btn) => btn.style.display = 'block');
    };

    paletteOpen?.addEventListener('click', openPalette);
    document.addEventListener('keydown', (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'k') {
        event.preventDefault();
        palette.hidden ? openPalette() : closePalette();
      }
      if (event.key === 'Escape' && !palette.hidden) closePalette();
    });

    palette?.addEventListener('click', (event) => {
      if (event.target === palette) closePalette();
    });

    paletteInput?.addEventListener('input', (event) => {
      const query = event.target.value.toLowerCase();
      document.querySelectorAll('.command-list button').forEach((btn) => {
        btn.style.display = btn.textContent.toLowerCase().includes(query) ? 'block' : 'none';
      });
    });

    document.querySelectorAll('.command-list button').forEach((button) => {
      button.addEventListener('click', () => {
        const target = button.dataset.target;
        if (button.dataset.external === 'true') {
          window.open(target, '_blank', 'noopener');
        } else {
          document.querySelector(target)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        closePalette();
      });
    });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add('revealed');
      });
    }, { threshold: 0.15 });
    document.querySelectorAll('[data-reveal]').forEach((el) => observer.observe(el));

    const statObserver = new IntersectionObserver((entries, obs) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;
        const target = entry.target;
        const max = Number(target.dataset.count);
        let value = 0;
        const interval = setInterval(() => {
          value += Math.max(1, Math.round(max / 60));
          if (value >= max) {
            target.textContent = max;
            clearInterval(interval);
          } else {
            target.textContent = value;
          }
        }, 20);
        obs.unobserve(target);
      });
    }, { threshold: 0.35 });

    document.querySelectorAll('[data-count]').forEach((item) => statObserver.observe(item));
  </script>
</body>
</html>
